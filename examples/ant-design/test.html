
<!DOCTYPE html>

<html class="no-js">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title></title>
  <meta name="description" content="" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.staticfile.org/axios/0.19.0-beta.1/axios.js"></script>
  <script src="../cdn/vue/vue.global.min.js"></script>
  <link rel="stylesheet" href="../../lib/index.css" />
  <link rel="stylesheet" href="https://cdn.staticfile.org/animate.css/3.7.0/animate.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4.2.6/dist/reset.css" />
  <link rel="stylesheet" href="../cdn/element-plus/index.css" />

  <script src="../../lib/tvue.js"></script>
  <script src="../cdn/element-plus/index.full.min.js"></script>
  <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/customParseFormat.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekday.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/localeData.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekOfYear.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekYear.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/advancedFormat.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/quarterOfYear.js"></script>
  <script src="https://unpkg.com/ant-design-vue@4.2.6/dist/antd.min.js"></script>

</head>

<body>
  <div id="app">
    {{form}}
    <tvue-ant-form v-model="form" :option="option"></tvue-ant-form>
  </div>
</body>
<script>
  let baseUrl = 'https://api.avuejs.com/area'
  let app = Vue.createApp({
    data() {
      return {
        value: '',
        form: {
          province: "120000",
          multipleSelect: [],
          cascader: ["620000", "620200" ]
        },
        options: [{
          value: 'zhejiang',
          label: 'Zhejiang',
          isLeaf: false,
        },
          {
            value: 'jiangsu',
            label: 'Jiangsu',
            isLeaf: false,
          },],
        option: {
          column: [
            {
              label: '级联',
              prop: 'cascader',
              type: 'ant-cascader',
              props: {
                label: 'name',
                value: 'code'
              },
              checkStrictly: true,
              lazy: true,
              lazyLoad(node, resolve) {
                let stop_level = 2;
                let level = node.level;
                let data = node.data || {}
                let code = data.code;
                let list = [];
                let callback = () => {
                  resolve((list || []).map(ele => {
                    return Object.assign(ele, {
                      leaf: level >= stop_level
                    })
                  }));
                }
                if (level == 0) {
                  axios.get(`${baseUrl}/getProvince`).then(res => {
                    list = res.data;
                    callback()
                  })
                }
                if (level == 1) {
                  axios.get(`${baseUrl}/getCity/${code}`).then(res => {
                    list = res.data;
                    callback()
                  })
                } else if (level == 2) {
                  axios.get(`${baseUrl}/getArea/${code}`).then(res => {
                    list = res.data;
                    callback()
                  })
                }
              }
            },
            {
              label: '级联',
              prop: 'cascader',
              type: 'cascader',
              props: {
                label: 'name',
                value: 'code'
              },
              lazy: true,
              checkStrictly: true,
              lazyLoad(node, resolve) {
                console.log(node)
                let stop_level = 2;
                let level = node.level;
                let data = node.data || {}
                let code = data.code;
                let list = [];
                let callback = () => {
                  resolve((list || []).map(ele => {
                    return Object.assign(ele, {
                      leaf: level >= stop_level
                    })
                  }));
                }
                if (level == 0) {
                  axios.get(`${baseUrl}/getProvince`).then(res => {
                    list = res.data;
                    callback()
                  })
                }
                if (level == 1) {
                  axios.get(`${baseUrl}/getCity/${code}`).then(res => {
                    list = res.data;
                    callback()
                  })
                } else if (level == 2) {
                  axios.get(`${baseUrl}/getArea/${code}`).then(res => {
                    list = res.data;
                    callback()
                  })
                }
              }
            }
          ]
        }
      }
    },
    mounted() {
      this.obj = {
        switch: 1,
        selects: '0,1',
        name: 'small',
        cascader: [3, 1],
        default: 10,
        tree: [2],
        province: '220000',
        city: '220700',
        area: '220702',
        icon: 'DownOutlined',
      }
    },
    methods: {
      submit(form, done) {
        this.$message.success('3s后关闭');
        setTimeout(() => {
          done()
        }, 3000)
      },
    }
  })
  app.use(antd)
  app.use(TVUE)
  app.use(ElementPlus)
  app.mount('#app')
</script>

<style lang="css">
  .field-desc2 {
    font-size: 12px;
    color: rgb(12, 180, 79);
    font-style: italic;
  }
</style>
</html>
