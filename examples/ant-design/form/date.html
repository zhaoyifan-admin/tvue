<!DOCTYPE html>

<html class="no-js">

<head>
  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title></title>
  <meta name="description" content=""/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="../../cdn/vue/vue.global.min.js"></script>
  <link rel="stylesheet" href="../../../dist/index.css"/>
  <link rel="stylesheet" href="https://cdn.staticfile.org/animate.css/3.7.0/animate.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4.2.6/dist/reset.css"/>
  <link rel="stylesheet" href="../../cdn/element-plus/index.css"/>

  <script src="../../../dist/tvue.js"></script>
  <script src="../../cdn/element-plus/index.full.min.js"></script>
  <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
  <script src="https://unpkg.com/axios@1.15.0/dist/axios.min.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/customParseFormat.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekday.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/localeData.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekOfYear.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekYear.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/advancedFormat.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/quarterOfYear.js"></script>
  <script src="https://unpkg.com/ant-design-vue@4.2.6/dist/antd.min.js"></script>

</head>

<body>
<div id="app">
  {{ form }}
  <tvue-ant-form v-model="form" :option="option"></tvue-ant-form>
</div>
</body>
<script>
  let app = Vue.createApp({
    data() {
      return {
        value: '',
        form: {},
        option: {
          componentType: 'ant',
          group: [{
            label: '基本用法',
            prop: 'jbxx',
            icon: 'el-icon-edit-outline',
            column: [
              {
                label: "日期",
                prop: "datetime1",
                type: "datetime",
              },
              {
                label: "快捷方式",
                prop: "date1",
                type: "date",
                shortcuts: [
                  {
                    text: '今天',
                    value: new Date(),
                  },
                  {
                    text: '昨天',
                    value: () => {
                      const date = new Date();
                      date.setTime(date.getTime() - 3600 * 1000 * 24);
                      return date;
                    },
                  },
                  {
                    text: '一周前',
                    value: () => {
                      const date = new Date();
                      date.setTime(date.getTime() - 3600 * 1000 * 24 * 7);
                      return date;
                    },
                  },
                ],
              },
              {
                label: "禁止日期",
                prop: "date2",
                type: "date",
                disabledDate(time) {
                  return time.getTime() < Date.now();
                },
              },
            ]
          }, {
            label: '格式化',
            prop: 'jbxx2',
            icon: 'el-icon-edit-outline',
            column: [
              {
                label: "日期",
                prop: "datetime2",
                type: "datetime",
                format: 'YYYY年MM月DD日 HH时mm分ss秒',
                valueFormat: 'YYYY-MM-DD HH:mm:ss'
              },
              {
                label: "时间戳",
                prop: "datetime3",
                type: "datetime",
                format: "YYYY-MM-DD HH:mm:ss",
                valueFormat: "x",
              }
            ]
          }, {
            label: '其他日期单位',
            prop: 'jbxx3',
            icon: 'el-icon-edit-outline',
            column: [
              {
                label: "时间",
                prop: "time",
                type: "time",
                format: 'HH:mm:ss',
                valueFormat: 'HH:mm:ss',
              },
              {
                label: "周",
                prop: "week",
                type: "date",
                pickerType: 'week',
                format: "YYYY 第 ww 周"
              },
              {
                label: "月",
                prop: "month",
                type: "date",
                pickerType: 'month',
              },
              {
                label: "季度",
                prop: "quarter",
                type: "date",
                pickerType: 'quarter',
              },
              {
                label: "年",
                prop: "year",
                type: "date",
                pickerType: 'year',
              },
              {
                label: "时间范围",
                prop: "timeRange",
                type: 'ant-timerange'
              },
              {
                label: "日期范围",
                prop: "dateRange",
                type: 'ant-daterange'
              },
              {
                label: "周范围",
                prop: "weekRange",
                pickerType: 'week',
                type: 'ant-daterange'
              },
              {
                label: "月范围",
                prop: "monthRange",
                pickerType: 'month',
                type: 'ant-daterange'
              },
              {
                label: "季度范围",
                prop: "quarterRange",
                type: 'ant-daterange',
                pickerType: 'quarter',
              },
              {
                label: "年范围",
                prop: "yearRange",
                pickerType: 'year',
                type: 'ant-daterange'
              },
            ]
          }],
        },
      }
    },
    mounted() {
      this.obj = {
        switch: 1,
        selects: '0,1',
        name: 'small',
        cascader: [3, 1],
        default: 10,
        tree: [2],
        province: '220000',
        city: '220700',
        area: '220702',
        icon: 'DownOutlined',
      }
    },
    methods: {
      submit(form, done) {
        this.$message.success('3s后关闭');
        setTimeout(() => {
          done()
        }, 3000)
      },
    }
  })
  app.use(antd)
  app.use(TVUE, {
    axios: axios
  })
  app.use(ElementPlus)
  app.mount('#app')
</script>

<style lang="css">
  .field-desc2 {
    font-size: 12px;
    color: rgb(12, 180, 79);
    font-style: italic;
  }
</style>
</html>
