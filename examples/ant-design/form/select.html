            }]

            removeTag: value => {
              console.log(value)
              message.success(`已删除: ${value}`);
              return true;

            dropdownRender: (menu, {option, value}) => {
              const h = Vue.h;

                menu,

                  onClick: () => {

              const h = Vue.h;
              const selectedCount = Array.isArray(value) ? value.length : 0;

                h('div', {

                    padding: '3px 12px',
                    background: '#e6f7ff',

                    borderRadius: '4px 4px 0 0',

                h('div', {
                  style: {
                    padding: '8px 12px',
                    background: '#fafafa',
                    fontSize: '12px',
                    color: '#666'

                h('a-divider', {style: {margin: '4px 0'}}),
                h('div', {
                  style: {
                    padding: '8px 12px',
                    textAlign: 'center',
                    color: '#999',
                    fontSize: '12px'

                }, '提示：可使用搜索功能快速查找')

              label: `选项${i + 1}`,
              value: i + 1

          }, {
            label: "带提示信息",
            prop: "select12",
            type: 'ant-select',
            multiple: true,
            filterable: true,
            dropdownRender: function (menu, {option, value}) {
              const h = Vue.h;

                h('div', {
                  style: {
                    padding: '8px 12px',
                    background: '#e6f7ff',
                    border: '1px solid #91d5ff',
                    borderRadius: '4px 4px 0 0',
                    fontSize: '12px',
                    color: '#1890ff'
                  }
                }, '💡 提示：可以输入关键词搜索选项'),

                // 默认菜单
                menu,

                // 底部操作区
                h('a-divider', {style: {margin: '4px 0'}}),
                h('div', {
                  style: {
                    padding: '8px 12px',
                    textAlign: 'center'
                  }
                }, [
                  h('span', {
                    style: {
                      color: '#999',
                      fontSize: '12px',
                      cursor: 'pointer'
                    },
                    onClick: () => {
                      console.log('===== 下拉菜单信息 =====');
                      console.log('所有选项:', option);
                      console.log('已选中的值:', value);
                      console.log('已选中数量:', Array.isArray(value) ? value.length : 0);

            multiple: true,
            collapseTags: true,
            maxCollapseTags: 2,
            filterable: true,
            all: true,
            dropdownRender: function (menu, {option, value}) {
              const h = Vue.h;
              const selectedCount = Array.isArray(value) ? value.length : 0;
              const totalCount = option.length;
              const percent = totalCount > 0 ? Math.round((selectedCount / totalCount) * 100) : 0;

              return h('div', [
                // 统计卡片
                h('div', {
                  style: {
                    padding: '12px',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    color: 'white',
                    borderRadius: '4px 4px 0 0',
                    marginBottom: '8px'
                  }
                }, [
                  h('div', {
                    style: {
                      fontSize: '14px',
                      fontWeight: 'bold',
                      marginBottom: '4px'
                    }
                  }, '📈 选择进度'),
                  h('div', {
                    style: {
                      fontSize: '12px',
                      opacity: 0.9
                    }
                  }, `已选 ${selectedCount}/${totalCount} 项 (${percent}%)`),
                  h('div', {
                    style: {
                      marginTop: '8px',
                      height: '4px',
                      background: 'rgba(255,255,255,0.3)',
                      borderRadius: '2px',
                      overflow: 'hidden'
                    }
                  }, [
                    h('div', {
                      style: {
                        width: `${percent}%`,
                        height: '100%',
                        background: 'white',
                        transition: 'width 0.3s ease'
                      }
                    })
                  ])

                    padding: '8px 12px',
                    textAlign: 'center',
                    fontSize: '12px',
                    color: '#999',
                    borderTop: '1px solid #f0f0f0',
                    marginTop: '4px'
                  }
