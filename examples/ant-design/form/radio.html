<body>
<div id="app">
  {{form}}
  <tvue-ant-form v-model="form" :option="option"></tvue-ant-form>
</div>
</body>
<script>
  let app = Vue.createApp({
    data() {
      return {
        value: '',
        form: {
        },
        option: {
          column: [
            {
              label: '单选',
              prop: 'radio1',
              type: 'ant-radio',
              dicData: [
                { label: '男', value: 0 },
                { label: '女', value: 1 },
                { label: '未知', value: '' }
              ]
            }, {
              label: '单选',
              prop: 'radio2',
              type: 'ant-radio',
              props: {
                label: 'name',
                value: 'code'
              },
              dicUrl: 'https://api.avuejs.com/area/getProvince'
            },{
              label: '单选框',
              prop: 'radio3',
              type: 'ant-radio',
              dicData: [
                { label: '男', value: 0 },
                { label: '女', value: 1 },
                { label: '未知', value: '' }
              ],
              value: 0
            }, {
              label: '单选框',
              prop: 'radio4',
              type: 'ant-radio',
              dicData: [
                { label: '男', value: 0 },
                { label: '女', value: 1 },
                { label: '未知', value: '' }
              ],
              disabled: true
            },{
              label: '单选框',
              prop: 'radio5',
              type: 'ant-radio',
              dicData: [
                { label: '男', value: 0 },
                { label: '女', value: 1, disabled: true },
                { label: '未知', value: '' }
              ]
            },{
              label: '实心单选',
              prop: 'radio6',
              type: 'ant-radio',
              button: true,
              dicData: [
                { label: '男', value: 0 },
                { label: '女', value: 1 },
                { label: '未知', value: '' }
              ]
            }
          ]
        }
      }
    },
    mounted() {
      this.obj = {
        switch: 1,
        selects: '0,1',
        name: 'small',
        cascader: [3, 1],
        default: 10,
        tree: [2],
        province: '220000',
        city: '220700',
        area: '220702',
        icon: 'DownOutlined',
      }
    },
    methods: {
      submit(form, done) {
        this.$message.success('3s后关闭');
        setTimeout(() => {
          done()
        }, 3000)
      },
    }
  })
  app.use(antd)
  app.use(TVUE, { axios })
  app.use(ElementPlus)
  app.mount('#app')
</script>
