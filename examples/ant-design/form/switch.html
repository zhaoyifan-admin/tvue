<head>
  <meta charset="utf-8"/>

  <meta name="description" content=""/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="../../cdn/vue/vue.global.min.js"></script>
  <link rel="stylesheet" href="../../../dist/index.css"/>
  <link rel="stylesheet" href="https://cdn.staticfile.org/animate.css/3.7.0/animate.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4.2.6/dist/reset.css"/>
  <link rel="stylesheet" href="../../cdn/element-plus/index.css"/>

  <script src="../../../dist/tvue.js"></script>
  <script src="../../cdn/element-plus/index.full.min.js"></script>
  <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>

  <script src="https://unpkg.com/dayjs/plugin/weekday.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/localeData.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekOfYear.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/weekYear.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/advancedFormat.js"></script>
  <script src="https://unpkg.com/dayjs/plugin/quarterOfYear.js"></script>

</head>

<body>
<div id="app">
  {{ form }}
  <tvue-ant-form v-model="form" :option="option"></tvue-ant-form>
</div>
</body>
<script>
  let app = Vue.createApp({
    data() {
      return {
        value: '',
        form: {},
        option: {
          componentType: 'ant',
          column: [
            {
              label: '开关',
              prop: 'switch',
              type: 'switch',
              dicData: [
                { label: '关', value: 0 },
                { label: '开', value: 1 }
              ],
              value: 1
            },
            {
              label: '开关',
              prop: 'switch2',
              type: 'switch',
              dicData: [{
                label: '关',
                value: 0
              }, {
                label: '开',
                value: 1
              }],
              disabled: true
            },
            {
              label: '开关',
              prop: 'switch3',
              type: 'switch',
              props: {
                label: 'name',
                value: 'code'
              },
              dicData: [{
                name: '关',
                code: 0
              }, {
                name: '开',
                code: 1
              }]
            },
            {
              label: '开关',
              prop: 'switch4',
              type: 'switch',
              props: {
                label: 'name',
                value: 'code'
              },
              dicUrl: 'https://api.avuejs.com/area/getProvince'
            },
            {
              label: '开关',
              prop: 'switch5',
              type: 'switch',
              beforeChange: (done) => {
                setTimeout(() => {
                  done(true);
                }, 1000);
              },
              dicData: [
                { label: '关', value: 0 },
                { label: '开', value: 1 }
              ]
            }
          ]
        },
      }
    },
    mounted() {
      this.obj = {
        switch: 1,
        selects: '0,1',
        name: 'small',
        cascader: [3, 1],
        default: 10,
        tree: [2],
        province: '220000',
        city: '220700',
        area: '220702',
        icon: 'DownOutlined',
      }
    },
    methods: {
      submit(form, done) {
        this.$message.success('3s后关闭');
        setTimeout(() => {
          done()
        }, 3000)
      },
    }
  })
  app.use(antd)
  app.use(TVUE, {
    axios: axios
  })
  app.use(ElementPlus)
  app.mount('#app')
</script>

<style lang="css">
  .field-desc2 {

</style>
