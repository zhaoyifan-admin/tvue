<!DOCTYPE html>

<html class="no-js">

    <title></title>
    <meta name="description" content="" />

    <script src="../../cdn/axios/axios.js"></script>

    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />

  <script>
    var app = Vue.createApp({
      data() {
        return {
          img: "",
        };
      },
      methods: {
        handleSubmit() {
          this.img = this.$refs.sign.submit(80, 50);
          console.log(this.img);
        },
      },
    });
    app.use(ElementPlus);
    app.use(TVUE);
    app.mount("#app");
