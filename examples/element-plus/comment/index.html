<!DOCTYPE html>

<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="../../cdn/axios/axios.js"></script>

    <script src="../../cdn/vue/vue.global.min.js"></script>
    <!-- 导入表格需要的包 -->

    <script src="../../cdn/filesaver/FileSaver.min.js"></script>
    <script src="../../cdn/xlsx/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>
    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      <tvue-comment :option="option" :data="data">
        <el-icon @click="$message('自定义菜单')">
          <el-icon-delete />
        </el-icon>
      </tvue-comment>
      <tvue-comment :option="option" :data="data" reverse></tvue-comment>
    </div>
  </body>
  <script>
    var app = Vue.createApp({
      data() {
        return {
          data: {
            avatar:
              "https://avatar.gitee.com/uploads/61/632261_smallweigit.jpg!avatar100?1518660401",
            author: "某人",
            body: `<p>那，那是一封写给南部母亲的信。我茫然站在骑楼下，我又看到永远的樱子走到街心。其实雨下得并不大，却是一生一世中最大的一场雨。而那封信是这样写的，年轻的樱子知不知道呢？</p>
            <blockquote>妈：我打算在下个月和樱子结婚。</blockquote>`,
          },
          option: {
            props: {
              avatar: "avatar",
              author: "author",
              body: "body",
            },
          },
        };
      },
    });
    app.use(ElementPlus);
    app.use(TVUE);
    app.mount("#app");
  </script>
</html>
