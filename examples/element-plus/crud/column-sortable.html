<!DOCTYPE html>

<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="../../cdn/axios/axios.js"></script>
    <!-- 导入表格需要的包 -->

    <script src="../../cdn/filesaver/FileSaver.min.js"></script>
    <script src="../../cdn/xlsx/xlsx.full.min.js"></script>

    <script src="../../cdn/vue/vue.global.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>
    <script src="../../cdn/sortable/Sortable.min.js"></script>
    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      <tvue-crud ref="crud" :option="option" :data="data"></tvue-crud>
    </div>
  </body>
  <script>
    var app = Vue.createApp({
      data() {
        return {
          data: [
            {
              text1: "内容1-1",
              text2: "内容1-2",
            },
            {
              text1: "内容2-1",
              text2: "内容2-2",
            },
            {
              text1: "内容3-1",
              text2: "内容3-2",
            },
            {
              text1: "内容4-1",
              text2: "内容4-2",
            },
            {
              text1: "内容5-1",
              text2: "内容5-2",
            },
          ],
          option: {
            sortable: true,
            addBtn: false,
            menu: false,
            filterBtn: true,
            align: "center",
            column: [
              {
                label: "列内容1",
                prop: "text1",
              },
              {
                label: "列内容2",
                prop: "text2",
              },
              {
                label: "列内容3",
                prop: "text3",
              },
            ],
          },
        };
      },
      mounted() {
        this.$refs.crud.$refs.dialogColumn.columnBox = true;
      },
    });
    app.use(ElementPlus);
    app.use(TVUE);
    app.mount("#app");
  </script>
</html>
