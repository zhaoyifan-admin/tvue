<!DOCTYPE html>

<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="../../cdn/axios/axios.js"></script>
    <script src="../../../lib/locale/browser/en.js"></script>
    <script src="../../cdn/vue/vue.global.min.js"></script>
    <!-- 导入表格需要的包 -->

    <script src="../../cdn/filesaver/FileSaver.min.js"></script>
    <script src="../../cdn/xlsx/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>
    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      <tvue-crud ref="crud" :option="option" :data="data"></tvue-crud>
    </div>
  </body>

  <script>
    var app = Vue.createApp({
      data() {
        return {
          option: {
            dateBtn: true,
            selection: true,
            filterBtn: true,
            column: [
              {
                label: "姓名",
                prop: "name",
              },
              {
                label: "年龄",
                prop: "sex",
              },
            ],
          },
          data: [
            {
              id: 1,
              name: "张三",
              sex: 12,
            },
            {
              id: 2,
              name: "李四",
              sex: 20,
            },
          ],
        };
      },
    });

    app.use(ElementPlus);
    app.use(TVUE, { locale: "en" });
    app.mount("#app");
  </script>
</html>
