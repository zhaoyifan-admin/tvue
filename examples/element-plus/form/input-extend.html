<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avue Input 扩展类型示例</title>
    <script src="../../cdn/axios/axios.js"></script>
    <script src="../../cdn/vue/vue.global.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>
    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      <div class="demo-section">
        <tvue-form
          v-model="form"
          :option="option"
          @submit="handleSubmit"
        ></tvue-form>
      </div>
      <div class="demo-section">
        <h3>表单数据</h3>
        <pre>{{ JSON.stringify(form, null, 2) }}</pre>
      </div>
    </div>

    <script src="../../../node_modules/vue/dist/vue.global.js"></script>
    <script src="../../../node_modules/element-plus/dist/index.full.js"></script>
    <script src="../../../dist/tvue.js"></script>
    <script>
      const { createApp, ref } = Vue;

      const app = createApp({
        setup() {
          const form = ref({
            phone: "",
            email: "",
            code: "",
            currency: "",
            bankCard: "",
            idCard: "",
            plate: "",
            ip: "",
            mac: "",
            uscc: "",
          });

          const option = ref({
            labelWidth: 140,
            column: [
              {
                label: "手机号",
                prop: "phone",
                type: "phone",
                span: 12,
                defaultPhoneCode: "+86",
              },
              {
                label: "邮箱",
                prop: "email",
                type: "email",
                span: 12,
                placeholder: "请输入邮箱地址",
              },
              {
                label: "验证码",
                prop: "code",
                type: "code",
                span: 12,
                codeLength: 6,
              },
              {
                label: "金额",
                prop: "currency",
                type: "currency",
                span: 12,
                currency: "CNY",
                currencyUnit: "元",
              },
              {
                label: "银行卡",
                prop: "bankCard",
                type: "bankCard",
                span: 12,
              },
              {
                label: "身份证",
                prop: "idCard",
                type: "idCard",
                span: 12,
              },
              {
                label: "车牌号",
                prop: "plate",
                type: "plate",
                span: 12,
                defaultPlateProvince: "京",
              },
              {
                label: "IP地址",
                prop: "ip",
                type: "ip",
                span: 12,
              },
              {
                label: "MAC地址",
                prop: "mac",
                type: "mac",
                span: 12,
                macSeparator: ":",
              },
              {
                label: "统一社会信用代码",
                prop: "uscc",
                type: "uscc",
                span: 24,
              },
            ],
          });

          const handleSubmit = (form, done) => {
            console.log("提交数据:", form);
            done();
          };

          return {
            form,
            option,
            handleSubmit,
          };
        },
      });

      app.use(ElementPlus);
      app.use(TVUE);
      app.mount("#app");
    </script>
  </body>
</html>
