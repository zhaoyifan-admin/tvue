<!DOCTYPE html>

<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../../cdn/axios/axios.js"></script>
    <script src="../../cdn/vue/vue.global.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>

    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      {{form}}
      <el-button type="primary" @click="form.deep.deep.deep.test1='1.1'">
        改变1</el-button
      >
      <el-button type="primary" @click="form.deep.deep.deep.test2='1.2'"
        >改变2</el-button
      >
      <tvue-form :option="option" v-model="form"> </tvue-form>
    </div>
  </body>
  <script>
    var app = Vue.createApp({
      data() {
        return {
          form: {
            test: 1,
            deep: {
              deep: {
                deep: {
                  test1: 1,
                  test2: 2,
                },
              },
            },
          },
          option: {
            labelWidth: 120,
            column: [
              {
                label: "我是深结构1",
                prop: "test1",
                className: "tvue-123-123",
                bind: "deep.deep.deep.test1",
              },
              {
                label: "我是深结构2",
                prop: "test2",
                bind: "deep.deep.deep.test2",
              },
            ],
          },
        };
      },
    });
    app.use(ElementPlus);
    app.use(TVUE);
    app.mount("#app");
  </script>
</html>
