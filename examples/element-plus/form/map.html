<!DOCTYPE html>

<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      window._AMapSecurityConfig = {
        securityJsCode: "xxxxxx",
      };
    </script>
    <script src="../../cdn/amap/maps.js"></script>
    <script src="../../cdn/amap/ui-main.js"></script>
    <script src="../../cdn/axios/axios.js"></script>
    <script src="../../cdn/vue/vue.global.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>
    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      {{obj}}
      <tvue-form :option="option" v-model="obj"></tvue-form>
    </div>
  </body>
  <script>
    var app = Vue.createApp({
      data() {
        return {
          obj: {
            map: "113.12209610000252,41.03928506034977, 内蒙古自治区乌兰察布市集宁区前进路街道新体大街航天小区",
          },
          option: {
            column: [
              {
                label: "地图",
                prop: "map",
                type: "map",
                mapChange(val) {
                  console.log(val);
                },
                rules: [
                  {
                    required: true,
                    message: "请选择地图",
                    trigger: "change",
                  },
                ],
              },
            ],
          },
        };
      },
    });
    app.use(ElementPlus);
    app.use(TVUE);
    app.mount("#app");
  </script>
</html>
