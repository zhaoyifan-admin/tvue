<!DOCTYPE html>

<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../../cdn/axios/axios.js"></script>
    <script src="../../cdn/vue/vue.global.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>

    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      <tvue-form v-model="form" :option="option"></tvue-form>
    </div>
  </body>
  <script>
    var app = Vue.createApp({
      data() {
        return {
          form: {},
          option: {
            column: [
              {
                label: "文本1",
                prop: "text1",
              },
              {
                label: "",
                labelWidth: 40,
                prop: "divider",
                component: "elDivider", //ele分割线
                span: 24,
                params: {
                  html: '<h2 style="color:red">自定义html标签</h2>',
                  contentPosition: "left",
                },
              },
              {
                label: "文本2",
                prop: "text2",
              },
              {
                label: "",
                labelWidth: 40,
                prop: "calendar",
                component: "elCalendar", //ele日期
                span: 24,
                params: {},
              },
            ],
          },
        };
      },
    });
    app.use(ElementPlus);
    app.use(TVUE);
    app.mount("#app");
  </script>
</html>
