<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../../cdn/axios/axios.js"></script>
    <script src="../../cdn/vue/vue.global.min.js"></script>
    <link rel="stylesheet" href="../../cdn/element-plus/index.css" />
    <script src="../../cdn/element-plus/index.full.min.js"></script>
    <script src="../../cdn/element-plus/icons-vue.js"></script>
    <link rel="stylesheet" href="../../cdn/animate/animate.min.css" />
    <link rel="stylesheet" href="../../../dist/index.css" />
    <script src="../../../dist/tvue.js"></script>
  </head>

  <body>
    <div id="app">
      <el-button type="primary" @click="handlePrint1">打印局部</el-button>
      <el-button type="primary" @click="handlePrint">打印全部</el-button>
      <div id="test">
        <h2 style="color: red">我是测试字段</h2>
      </div>
    </div>
  </body>
  <script>
    var app = Vue.createApp({
      methods: {
        handlePrint1() {
          this.$Print("#test");
        },
        handlePrint() {
          this.$Print("#app");
        },
      },
    });
    app.use(ElementPlus);
    app.use(TVUE);
    app.mount("#app");
  </script>
</html>
