name: Sync To Gitee

on:
  schedule:
    - cron: '5 8 * * *'  # 每天下午16:05（北京时间）
  push:
  delete:
  create:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@master
        env:
          # 注意在 Settings->Secrets 配置 GITEE_PRIVATE_KEY
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
        with:
          # 注意替换为你的 GitHub 源仓库地址
          source-repo: git@github.com:zhaoyifan-admin/tvue.git
          # 注意替换为你的 Gitee 目标仓库地址
          destination-repo: git@gitee.com:tianjin-enheng-entertainment/tvue.git


