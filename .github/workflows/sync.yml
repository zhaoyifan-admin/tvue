name: Sync to Gitee

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync to Gitee
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 添加 Gitee 远程仓库
          git remote add gitee https://gitee.com/tianjin-enheng-entertainment/tvue.git

          # 设置认证信息
          git remote set-url gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/tianjin-enheng-entertainment/tvue.git

          # 推送到 Gitee
          git push gitee main --force

