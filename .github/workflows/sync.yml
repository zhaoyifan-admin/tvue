name: Sync to Gitee

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # 正确处理私钥格式，确保换行符正确
          echo "${{ secrets.GITEE_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 验证私钥格式
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

          # 添加 Gitee 到已知主机
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

          # 配置 Git 用户信息
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync to Gitee
        run: |
          # 添加 Gitee 远程仓库（使用 SSH）
          git remote add gitee git@gitee.com:tianjin-enheng-entertainment/tvue.git

          # 推送到 Gitee
          git push gitee main --force

